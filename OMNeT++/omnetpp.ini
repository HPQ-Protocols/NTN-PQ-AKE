[General]
network = AKENetwork
sim-time-limit = 10s
**.cpuFrequency = 168000000Hz

# =========================================================================
# 1. GIAO THỨC ĐỀ XUẤT: NTN-PQ-AKE (Tổng: 3,889,149 cycles)
# =========================================================================
[Config NTN_PQ_AKE]
description = "Proposed Post-Quantum Authenticated Key Exchange for NTN"
# Phân bổ chu kỳ tính toán đo từ STM32F407G
**.cyclesM1 = 1500000
**.cyclesM2 = 1389149
**.cyclesM3 = 800000
**.cyclesM4 = 200000

# Chi phí truyền thông: Tối ưu tối đa cho băng thông vệ tinh hẹp
**.payloadM1 = 1232    # Kyber-768 PK (1184B) + NonceA (16B) + TokenA (32B)
**.overheadM1 = 2      # Chỉ cần 2 bytes Custom Header định dạng kiểu bản tin
**.payloadM2 = 1136    # Kyber-768 CT (1088B) + NonceB (16B) + ConfirmB (32B)
**.overheadM2 = 2
**.payloadM3 = 32      # ConfirmA (32B)
**.overheadM3 = 2
**.payloadM4 = 32      # BỔ SUNG: ConfirmB (32B) gửi ngược lại từ Bob về Alice (Flight 4)
**.overheadM4 = 2      # BỔ SUNG: Tiêu đề gói tin M4

# =========================================================================
# 2. CLASSICAL TLS: ECDHE + ECDSA (Tổng: 66,046,764 cycles)
# =========================================================================
[Config Classical_TLS]
description = "Standard TLS 1.3 using Elliptic Curve Cryptography"
# Phân bổ chu kỳ tính toán đo từ STM32F407G
# (Ký số ECDSA và tính toán đường cong Elliptic rất nặng trên vi điều khiển)
**.cyclesM1 = 25000000
**.cyclesM2 = 25000000
**.cyclesM3 = 12000000
**.cyclesM4 = 4046764

# Chi phí truyền thông: Bản tin gọn nhưng gánh nặng tiêu đề TLS chuẩn
**.payloadM1 = 64      # ECDHE Public Key (64B)
**.overheadM1 = 150    # Gánh nặng TLS ClientHello tiêu chuẩn + Extensions
**.payloadM2 = 1200    # ECDHE PK (64B) + Certificate & Chữ ký ECDSA nặng (~1100B)
**.overheadM2 = 200    # TLS ServerHello + EncryptedExtensions Headers
**.payloadM3 = 32      # TLS Finished MAC (32B)
**.overheadM3 = 50     # TLS Record Header


# =========================================================================
# 3. HYBRID TLS: ECDHE + KYBER (Tổng: 68,771,860 cycles)
# =========================================================================
[Config Hybrid_TLS]
description = "Hybrid Classical and Post-Quantum TLS 1.3"
# Phân bổ chu kỳ tính toán đo từ STM32F407G
# (Kết hợp cả ECC truyền thống và Kyber hậu khóa sai nên tốn tài nguyên nhất)
**.cyclesM1 = 4500000
**.cyclesM2 = 55000000
**.cyclesM3 = 8000000
**.cyclesM4 = 1271860

# Chi phí truyền thông: Gói tin cực kỳ cồng kềnh do mang cả 2 loại khóa
**.payloadM1 = 1248    # ECDHE PK (64B) + Kyber-768 PK (1184B)
**.overheadM1 = 180    # TLS ClientHello + Key Share Extensions cho cả 2 thuật toán
**.payloadM2 = 1952    # ECDHE PK (64B) + Kyber-768 CT (1088B) + ECDSA Certificate & Sig (~800B)
**.overheadM2 = 250    # Phình to do gánh cấu trúc Extensions phức tạp của TLS 1.3
**.payloadM3 = 32      # TLS Finished MAC (32B)
**.overheadM3 = 50


# =========================================================================
# 4. KEMTLS: NO SIGNATURES (Tổng: 4,598,640 cycles)
# =========================================================================
[Config KEMTLS]
description = "KEM-based Transport Layer Security (No Signatures)"
# Phân bổ chu kỳ tính toán đo từ STM32F407G
# (Thay thế chữ ký số bằng cơ chế đóng gói khóa KEM tĩnh để giảm chu kỳ CPU)
**.cyclesM1 = 1200000
**.cyclesM2 = 1800000
**.cyclesM3 = 1200000
**.cyclesM4 = 398640

# Chi phí truyền thông: Bản tin Server truyền xuống nặng vì mang Certificate chứa KEM công khai
**.payloadM1 = 1184    # Kyber Ephemeral PK (1184B)
**.overheadM1 = 120
**.payloadM2 = 2388    # Kyber Ephemeral CT (1088B) + Server Static Kyber PK Certificate (~1300B)
**.overheadM2 = 150
**.payloadM3 = 1088    # Client Auth Kyber CT gửi lại để xác thực Server (1088B)
**.overheadM3 = 60


# =========================================================================
# 5. PQ-TLS: KYBER + ML-DSA (Tổng: 10,824,936 cycles)
# =========================================================================
[Config PQ_TLS]
description = "Pure Post-Quantum TLS 1.3 (Kyber for KEM, ML-DSA for Signature)"
# Phân bổ chu kỳ tính toán đo từ STM32F407G
# (Xác thực bằng chữ ký số hậu tương lai ML-DSA)
**.cyclesM1 = 1200000
**.cyclesM2 = 6500000
**.cyclesM3 = 2500000
**.cyclesM4 = 624936

# Chi phí truyền thông: Điểm yếu cốt lõi của PQ-TLS là kích thước chữ ký ML-DSA cực lớn
**.payloadM1 = 1184    # Kyber Ephemeral PK (1184B)
**.overheadM1 = 150
**.payloadM2 = 4888    # Kyber CT (1088B) + Chữ ký số ML-DSA-65 (~3300B) + Certificate (~500B)
**.overheadM2 = 220    # Bản tin siêu nặng, dễ gây nghẽn mạch/vỡ gói tin trên kênh vệ tinh
**.payloadM3 = 32      # TLS Finished MAC (32B)
**.overheadM3 = 50


# =========================================================================
# 6. TLS 1.3 PSK + KYBER (Tổng: 3,435,009 cycles)
# =========================================================================
[Config TLS13_PSK_Kyber]
description = "TLS 1.3 Pre-Shared Key with Kyber"
# Phân bổ chu kỳ tính toán đo từ STM32F407G
# (Đối thủ nguy hiểm nhất vì bỏ qua bước xác thực bất đối xứng Cert/Signature)
**.cyclesM1 = 1300000
**.cyclesM2 = 1235009
**.cyclesM3 = 700000
**.cyclesM4 = 200000

# Chi phí truyền thông: Dù tải trọng tương đương giao thức đề xuất nhưng vẫn gánh Overhead của TLS
**.payloadM1 = 1232    # Kyber PK (1184B) + PSK Binder/Identity (48B)
**.overheadM1 = 120    # Gánh thêm cấu trúc Extension định dạng nghiêm ngặt của TLS chuẩn
**.payloadM2 = 1136    # Kyber CT (1088B) + Finished MAC (48B)
**.overheadM2 = 95     # Gánh thêm TLS ServerHello, EncryptedExtensions
**.payloadM3 = 32      # TLS Finished MAC (32B)
**.overheadM3 = 45     # TLS Record Header